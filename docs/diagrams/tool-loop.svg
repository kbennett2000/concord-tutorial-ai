<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <!-- The course's tool-loop diagram (built in lesson 3; lessons 4–5 reference it).
       Self-backed panel so it reads identically on GitHub light and dark. -->
  <rect x="0" y="0" width="760" height="300" rx="12" fill="#faf7f0" stroke="#d9cdb2"/>

  <!-- top row: the ask travels right -->
  <g>
    <rect x="28" y="40" width="120" height="58" rx="9" fill="#ffffff" stroke="#c9bfa8" stroke-width="1.5"/>
    <text x="88" y="64" text-anchor="middle" font-size="15" fill="#1c2733" font-weight="600">You</text>
    <text x="88" y="84" text-anchor="middle" font-size="12.5" fill="#52606d">ask a question</text>
  </g>
  <g>
    <rect x="200" y="40" width="150" height="58" rx="9" fill="#ffffff" stroke="#c9bfa8" stroke-width="1.5"/>
    <text x="275" y="64" text-anchor="middle" font-size="15" fill="#1c2733" font-weight="600">The model</text>
    <text x="275" y="84" text-anchor="middle" font-size="12.5" fill="#52606d">writes a request</text>
  </g>
  <g>
    <rect x="402" y="32" width="160" height="74" rx="9" fill="#2a4a6b" stroke="#1c3552" stroke-width="3"/>
    <text x="482" y="60" text-anchor="middle" font-size="15" fill="#ffffff" font-weight="700">Your code</text>
    <text x="482" y="80" text-anchor="middle" font-size="12.5" fill="#cfe0f2">decides — and runs it</text>
    <text x="482" y="96" text-anchor="middle" font-size="11" fill="#9fc1e8" font-style="italic">the rule lives here</text>
  </g>
  <g>
    <rect x="614" y="40" width="120" height="58" rx="9" fill="#ffffff" stroke="#c9bfa8" stroke-width="1.5"/>
    <text x="674" y="64" text-anchor="middle" font-size="15" fill="#1c2733" font-weight="600">Concord</text>
    <text x="674" y="84" text-anchor="middle" font-size="12.5" fill="#52606d">a real Bible</text>
  </g>

  <!-- forward arrows -->
  <g stroke="#8a5a00" stroke-width="2.2" fill="none" marker-end="url(#fwd)">
    <path d="M150 69 L196 69"/>
    <path d="M352 69 L398 69"/>
    <path d="M564 69 L610 69"/>
  </g>
  <text x="173" y="58" text-anchor="middle" font-size="11.5" fill="#8a5a00">question</text>
  <text x="375" y="58" text-anchor="middle" font-size="11.5" fill="#8a5a00">tool call</text>
  <text x="587" y="58" text-anchor="middle" font-size="11.5" fill="#8a5a00">fetch</text>

  <!-- return path: verse text flows back along the bottom -->
  <g stroke="#1a7f37" stroke-width="2.2" fill="none" marker-end="url(#ret)">
    <path d="M674 102 L674 168 L562 168"/>
    <path d="M482 110 L482 168 L478 168 M478 168 L356 168"/>
    <path d="M275 168 L275 226 L88 226 L88 188"/>
  </g>
  <g stroke="#1a7f37" stroke-width="2.2" fill="none">
    <path d="M558 168 L486 168"/>
    <path d="M352 168 L279 168"/>
  </g>
  <text x="620" y="158" text-anchor="middle" font-size="11.5" fill="#1a7f37">the verse — or the error, honestly</text>
  <text x="318" y="158" text-anchor="middle" font-size="11.5" fill="#1a7f37">tool result</text>
  <text x="182" y="216" text-anchor="middle" font-size="11.5" fill="#1a7f37">the answer, quoting the wire</text>

  <!-- the loop annotation -->
  <text x="482" y="200" text-anchor="middle" font-size="12" fill="#52606d" font-style="italic">…and if the model asks again, your code serves again —</text>
  <text x="482" y="218" text-anchor="middle" font-size="12" fill="#52606d" font-style="italic">round after round, until it stops asking.</text>

  <!-- footer -->
  <text x="380" y="276" text-anchor="middle" font-size="12.5" fill="#1c2733" font-weight="600">The model proposes. Your code disposes.</text>

  <defs>
    <marker id="fwd" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#8a5a00"/>
    </marker>
    <marker id="ret" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#1a7f37"/>
    </marker>
  </defs>
</svg>
